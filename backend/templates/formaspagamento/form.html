{% extends 'base.html' %}

{% block content %}

<h2>
    {% if form.instance.pk %}
        Editar Forma de Pagamento
    {% else %}
        Nova Forma de Pagamento
    {% endif %}
</h2>

<form method="post">

    {% csrf_token %}

    <p>
        Descrição:<br>
        {{ form.descricao }}
    </p>

    <p>
        Ativo:
        {{ form.ativo }}
    </p>

    <button type="submit" class="btn-save">Salvar</button>

    <a href="{% url 'formaspagamento:lista' %}" class="btn-cancel">Cancelar</a>

</form>

{% endblock %}
