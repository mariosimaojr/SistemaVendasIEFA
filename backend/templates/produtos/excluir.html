{% extends 'base.html' %}

{% block content %}

<h2>Excluir Produto</h2>

<p>
    Deseja realmente excluir o produto <strong>{{ produto.nome }}</strong>?
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-save">Confirmar</button>
    <a href="{% url 'produtos:lista' %}" class="btn-cancel">Cancelar</a>
</form>

{% endblock %}
