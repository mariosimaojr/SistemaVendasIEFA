<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Controle de Vendas</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }

        .header {
            background-color: #1f2937;
            color: white;
            padding: 20px 30px;
            font-size: 32px;
            font-weight: bold;
        }

        .container {
            display: flex;
            min-height: calc(100vh - 76px);
        }

        .sidebar {
            width: 250px;
            background-color: #e5e7eb;
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid #d1d5db;
        }

        .sidebar h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #111827;
            background-color: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-weight: bold;
        }

        .sidebar a:hover {
            background-color: #dbeafe;
        }

        .content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        .content-box {
            background-color: white;
            padding: 25px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        h1, h2 {
            margin-top: 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        table th,
        table td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: left;
        }

        table th {
            background-color: #f3f4f6;
        }

        .btn-link {
            display: inline-block;
            padding: 10px 14px;
            margin-bottom: 15px;
            text-decoration: none;
            background-color: #2563eb;
            color: white;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn-link:hover {
            background-color: #1d4ed8;
        }

        .btn-action {
            text-decoration: none;
            margin-right: 8px;
            font-weight: bold;
        }

        .btn-edit {
            color: #b45309;
        }

        .btn-delete {
            color: #b91c1c;
        }

        .btn-save,
        .btn-cancel {
            display: inline-block;
            padding: 10px 14px;
            text-decoration: none;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save {
            background-color: #16a34a;
            color: white;
        }

        .btn-cancel {
            background-color: #6b7280;
            color: white;
            margin-left: 8px;
        }

        form p {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            max-width: 500px;
            padding: 8px;
            box-sizing: border-box;
        }

        .dashboard-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .dashboard-card {
            width: 220px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
        }

        .card-vendas {
            background-color: #f97316;
        }

        .card-produtos {
            background-color: #16a34a;
        }

        .card-estoque {
            background-color: #2563eb;
        }

        .card-generico {
            background-color: #b2b2b2;
            color: rgb(52, 51, 51);
        }
    </style>
    {% block style %}
    {% endblock %}
</head>
<body>

    <div class="header">
        Sistema de Controle de Vendas
    </div>

    <div class="container">

        <div class="sidebar">
            <h3>Menu</h3>

            <a href="{% url 'home' %}">Início</a>
            <a href="{% url 'vendas:lista' %}">Vendas</a>
            <a href="{% url 'categorias:lista' %}">Categorias</a>
            <a href="{% url 'formaspagamento:lista' %}">Formas de Pagamento</a>
            <a href="{% url 'produtos:lista' %}">Produtos</a>
            <a href="{% url 'movimentacoes_estoque:lista' %}">Estoque</a>
            <a href="{% url 'relatorios:lista' %}">Relatórios</a>
            <a href="{% url 'usuarios:lista' %}">Usuários</a>
        </div>

        <div class="content">
            <div class="content-box">
                {% block content %}
                {% endblock %}
            </div>
        </div>

    </div>

</body>
</html>
